name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker tag to publish to Docker Hub"
        required: false
        default: ""
      push_latest:
        description: "Also publish the latest tag"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.10"
  IMAGE_REPOSITORY:
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ env.IMAGE_REPOSITORY }}:ci-${{ github.sha }}

  docker-publish:
    runs-on: ubuntu-latest
    needs:
      - test
      - docker-build
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        env:
          INPUT_TAG: ${{ github.event.inputs.image_tag }}
          PUSH_LATEST: ${{ github.event.inputs.push_latest }}
        run: |
          TAG="${INPUT_TAG}"
          if [ -z "${TAG}" ]; then
            TAG="${GITHUB_SHA}"
          fi
          echo "primary=${IMAGE_REPOSITORY}:${TAG}" >> "${GITHUB_OUTPUT}"
          if [ "${PUSH_LATEST}" = "true" ]; then
            echo "tags=${IMAGE_REPOSITORY}:${TAG},${IMAGE_REPOSITORY}:latest" >> "${GITHUB_OUTPUT}"
          else
            echo "tags=${IMAGE_REPOSITORY}:${TAG}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
